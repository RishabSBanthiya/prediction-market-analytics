{% extends "base.html" %}

{% block title %}Unusual Trades - Polymarket Analytics{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Unusual Flow Detection</h1>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <form class="row g-3" id="filter-form">
                    <div class="col-md-3">
                        <label class="form-label">Alert Type</label>
                        <select class="form-select" id="type-filter">
                            <option value="">All types</option>
                            <option value="SMART_MONEY_ACTIVITY">Smart Money</option>
                            <option value="OVERSIZED_BET">Oversized Bet</option>
                            <option value="COORDINATED_WALLETS">Coordinated Wallets</option>
                            <option value="VOLUME_SPIKE">Volume Spike</option>
                            <option value="PRICE_ACCELERATION">Price Acceleration</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Severity</label>
                        <select class="form-select" id="severity-filter">
                            <option value="">All severities</option>
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="CRITICAL">Critical</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control" id="category-filter" placeholder="All categories">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">&nbsp;</label>
                        <button type="submit" class="btn btn-primary w-100">Filter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>Alerts</h5>
                <div>
                    <span class="badge bg-info" id="alert-count">0</span>
                    <button class="btn btn-sm btn-outline-primary ms-2" id="toggle-realtime">
                        <i class="bi bi-wifi"></i> Real-time
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div id="alerts-list">
                    <p class="text-center">Loading...</p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
let ws = null;
let realtimeEnabled = false;

function getSeverityClass(severity) {
    const classes = {
        'CRITICAL': 'danger',
        'HIGH': 'warning',
        'MEDIUM': 'info',
        'LOW': 'secondary'
    };
    return classes[severity] || 'secondary';
}

function formatAlert(alert) {
    return `
        <div class="alert alert-${getSeverityClass(alert.severity)} alert-dismissible">
            <h6 class="alert-heading">
                <span class="badge bg-${getSeverityClass(alert.severity)}">${alert.severity}</span>
                ${alert.alert_type}
            </h6>
            <p><strong>${alert.question}</strong></p>
            <p><small>${alert.reason}</small></p>
            <hr>
            <div class="row">
                <div class="col-md-6">
                    <small><strong>Market:</strong> ${alert.market_id.substring(0, 30)}...</small><br>
                    <small><strong>Category:</strong> ${alert.category}</small>
                </div>
                <div class="col-md-6 text-end">
                    <small><strong>Time:</strong> ${new Date(alert.timestamp).toLocaleString()}</small><br>
                    ${alert.score ? `<small><strong>Score:</strong> ${alert.score.toFixed(1)}</small>` : ''}
                </div>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
}

async function loadAlerts() {
    try {
        const params = new URLSearchParams();
        const type = document.getElementById('type-filter').value;
        const severity = document.getElementById('severity-filter').value;
        const category = document.getElementById('category-filter').value;
        
        if (type) params.append('alert_type', type);
        if (severity) params.append('severity', severity);
        if (category) params.append('category', category);
        
        const res = await fetch(`/api/alerts/?${params.toString()}`);
        const alerts = await res.json();
        
        document.getElementById('alert-count').textContent = alerts.length;
        const html = alerts.length > 0 ? alerts.map(formatAlert).join('') : '<p class="text-center">No alerts found</p>';
        document.getElementById('alerts-list').innerHTML = html;
    } catch (error) {
        console.error('Error loading alerts:', error);
    }
}

function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/api/alerts/realtime`;
    
    ws = new WebSocket(wsUrl);
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'alert') {
            const alertHtml = formatAlert(data.data);
            document.getElementById('alerts-list').insertAdjacentHTML('afterbegin', alertHtml);
            const count = parseInt(document.getElementById('alert-count').textContent) + 1;
            document.getElementById('alert-count').textContent = count;
        }
    };
    
    ws.onerror = (error) => {
        console.error('WebSocket error:', error);
    };
    
    ws.onclose = () => {
        if (realtimeEnabled) {
            setTimeout(connectWebSocket, 5000);
        }
    };
}

document.getElementById('filter-form').addEventListener('submit', (e) => {
    e.preventDefault();
    loadAlerts();
});

document.getElementById('toggle-realtime').addEventListener('click', () => {
    realtimeEnabled = !realtimeEnabled;
    const btn = document.getElementById('toggle-realtime');
    
    if (realtimeEnabled) {
        btn.classList.add('active');
        btn.innerHTML = '<i class="bi bi-wifi-off"></i> Stop';
        connectWebSocket();
    } else {
        btn.classList.remove('active');
        btn.innerHTML = '<i class="bi bi-wifi"></i> Real-time';
        if (ws) {
            ws.close();
            ws = null;
        }
    }
});

loadAlerts();
</script>
{% endblock %}
